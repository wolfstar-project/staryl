overrides:
  ansi-regex: ^6.2.2
  minimist: ^1.2.8

allowBuilds:
  "@prisma/client": true
  "@prisma/engines": true
  prisma: true

dedupePeers: true

shellEmulator: true

minimumReleaseAge: 2880

minimumReleaseAgeExclude:
  - "@eslint-community/eslint-plugin-eslint-comments@4.7.2"

shamefullyHoist: true

hoistPattern:
  - "*prisma*"

ignoreWorkspaceRootCheck: true
